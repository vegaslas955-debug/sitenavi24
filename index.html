<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рабочий сайт</title>
  <style>
    /* ===== Базовые стили ===== */
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: sans-serif;
    }

    /* ===== Reveal элементы ===== */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.on {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== Курсор ===== */
    .cursor, .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
    }
    .cursor {
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
    }
    .cursor-ring {
      width: 40px;
      height: 40px;
      border: 2px solid white;
      border-radius: 50%;
      background: transparent;
    }

    /* ===== Canvas Starfield ===== */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: -1;
    }

    /* ===== Контент ===== */
    h1, p {
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <!-- Canvas для звезд -->
  <canvas id="starfield"></canvas>

  <!-- Курсор -->
  <div class="cursor" id="cur"></div>
  <div class="cursor-ring" id="ring"></div>

  <!-- Контент -->
  <h1 class="reveal">Привет! Это рабочий сайт.</h1>
  <p class="reveal">Все эффекты теперь работают прямо на Vercel без сборки.</p>

  <!-- ===== Встроенный JS ===== -->
  <script>
    // ===== Reveal =====
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('on'));
    });

    // ===== Курсор =====
    const cursor = document.getElementById('cur');
    const ring = document.getElementById('ring');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
    });

    function animateCursor() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      ring.style.transform = `translate(${ringX}px, ${ringY}px)`;
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // ===== Starfield =====
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    const STAR_COUNT = 200;

    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * canvas.width
      });
    }

    function drawStars() {
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      for (let i = 0; i < STAR_COUNT; i++) {
        const star = stars[i];
        const k = 128.0 / star.z;
        const x = (star.x - canvas.width/2) * k + canvas.width/2;
        const y = (star.y - canvas.height/2) * k + canvas.height/2;
        const size = (1 - star.z / canvas.width) * 2;
        ctx.fillRect(x, y, size, size);

        star.z -= 2;
        if (star.z <= 0) {
          star.z = canvas.width;
          star.x = Math.random() * canvas.width;
          star.y = Math.random() * canvas.height;
        }
      }
      requestAnimationFrame(drawStars);
    }
    drawStars();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
